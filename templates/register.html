{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md mt-10">
    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Create your Account</h2>
    <form action="{{ url_for('register') }}" method="POST" class="space-y-4">
        <div>
            <label class="block text-gray-700 text-sm font-semibold mb-2" for="username">Choose a Username</label>
            <input class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500" type="text" name="username" required>
        </div>
        <div>
            <label class="block text-gray-700 text-sm font-semibold mb-2" for="password">Password</label>
            <input class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500" type="password" name="password" required>
        </div>
        <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded transition duration-200">
            Register
        </button>
    </form>
    <p class="text-center text-sm text-gray-600 mt-4">
        Already registered? <a href="{{ url_for('login') }}" class="text-blue-600 hover:underline">Login here</a>.
    </p>
</div>
{% endblock %}
